name: Build ScathaExtras
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build with Gradle (Manual Mode)
        # We are running 'assemble' which is the heavy lifting task for Jars
        run: |
          chmod +x gradlew
          ./gradlew clean assemble --no-daemon --stacktrace

      - name: Verify Jar Existence
        # This checks if the file actually exists before trying to upload
        run: |
          echo "Checking build/libs/ folder..."
          ls -R build/libs/
          if [ -f build/libs/ScathaExtras-1.21.10.jar ]; then
            echo "Success: Jar found."
          else
            echo "Error: Jar not found!"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScathaExtras-Final-Jar
          path: build/libs/ScathaExtras-1.21.10.jar
