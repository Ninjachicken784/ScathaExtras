name: Build ScathaExtras
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle 8.11
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11'

      - name: Build with System Gradle
        # We use system 'gradle' to bypass any broken wrapper files in your repo
        run: gradle clean build --no-daemon

      - name: Final Verification
        run: |
          mkdir -p output
          find build/libs/ -name "*.jar" ! -name "*-dev.jar" -exec cp {} output/ScathaExtras-1.21.10.jar \;
          if [ -f output/ScathaExtras-1.21.10.jar ]; then
            echo "SUCCESS: Jar created."
          else
            echo "CRITICAL: Build finished but no jar was found in build/libs/"
            ls -R build/
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ScathaExtras-Final-Jar
          path: output/ScathaExtras-1.21.10.jar
