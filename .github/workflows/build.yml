name: Build ScathaExtras
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          # We use 'assemble' instead of 'build' to force-skip tests and just make the jar
          ./gradlew clean assemble --no-daemon --info

      - name: Force Verification of Artifacts
        # This is the "Deep Think" part: it looks for the jar and renames it manually 
        # to ensure there is no confusion on where the file is.
        run: |
          mkdir -p output
          find build/libs/ -name "ScathaExtras-*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" -exec cp {} output/ScathaExtras-1.21.10.jar \;
          if [ -f output/ScathaExtras-1.21.10.jar ]; then
            echo "MATCH FOUND: Mod jar is ready for upload."
          else
            echo "FAILURE: No valid mod jar was found in build/libs/"
            ls -R build/
            exit 1
          fi

      - name: Upload Final Jar
        uses: actions/upload-artifact@v4
        with:
          name: ScathaExtras-Final-Jar
          path: output/ScathaExtras-1.21.10.jar
