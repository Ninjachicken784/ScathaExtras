name: Build ScathaExtras
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Structure
        run: |
          echo "Scanning for ScathaTracker.java..."
          find . -name "ScathaTracker.java"
          if [ -z "$(find . -name "ScathaTracker.java")" ]; then
            echo "CRITICAL ERROR: ScathaTracker.java not found in the repo!"
            exit 1
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon

      - name: Verify Jar
        run: |
          mkdir -p output
          find build/ -name "*.jar" -exec cp {} output/ScathaExtras-1.21.10.jar \;
          if [ ! -f output/ScathaExtras-1.21.10.jar ]; then
            echo "BUILD FAILED: Compiler ran but no Jar was made."
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ScathaExtras-Final-Jar
          path: output/ScathaExtras-1.21.10.jar
